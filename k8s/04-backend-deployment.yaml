apiVersion: apps/v1
kind: Deployment

metadata:
  name: predictive-api
  namespace: predictive-maintenance

spec:
  replicas: 2

  selector:
    matchLabels:
      app: predictive-api

  template:
    metadata:
      labels:
        app: predictive-api

    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: predictive-api

        image: ghcr.io/bharathkumark19/predictive-backend:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        envFrom:
        - configMapRef:
            name: predictive-config
        - secretRef:
            name: predictive-secrets

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"

          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
